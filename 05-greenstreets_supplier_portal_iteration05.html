<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Greenstreets — Supplier Portal · Iteration 04</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════
   ITERATION 04 — full-screen Typeform cards + vertical scroll
   Combines:
   · the left sticky sidebar / progress / scroll-spy of iteration 03
   · the big one-per-screen Typeform card look of iteration 06
   Each section is a full-viewport card; you scroll (snap) through
   them and each animates in as it enters view. AI-suggested
   fields + click-to-edit prefills carried over.
   ══════════════════════════════════════════════════════════════ */
:root{
  --gs:#4ebb81; --gs-dim:rgba(78,187,129,.14); --gs-brd:rgba(78,187,129,.34);
  --bl:#3b82f6; --bl-dim:rgba(59,130,246,.14); --bl-brd:rgba(59,130,246,.45);
  --amb:#f5a623; --amb-dim:rgba(245,166,35,.13); --amb-brd:rgba(245,166,35,.35);
  --red:#f87171; --ai:#c084fc;
  --tx:#fff; --tx2:rgba(255,255,255,.72); --tx3:rgba(255,255,255,.5);
  --card:rgba(255,255,255,.05); --brd:rgba(255,255,255,.12); --brd2:rgba(255,255,255,.16);
  --topH:56px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-snap-type:y proximity;scroll-padding-top:var(--topH)}
body{font-family:"Inter",sans-serif;color:var(--tx);background:linear-gradient(160deg,#0e2040 0%,#102448 45%,#0c1a2e 100%);min-height:100vh}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--bl);outline-offset:3px;border-radius:6px}

/* ── Top header ── */
.ph{position:sticky;top:0;z-index:100;height:var(--topH);background:rgba(12,24,46,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.ph-brand b{font-size:14px;font-weight:700}.ph-brand span{font-size:9.5px;color:var(--tx3);margin-left:8px}
.ph-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ph-sku{font-size:10px;background:var(--gs-dim);color:var(--gs);border:1px solid rgba(78,187,129,.25);padding:3px 8px;border-radius:5px;font-weight:600}
.ph-due{font-size:11px;color:var(--tx3)}.ph-due strong{color:var(--amb)}

/* ── Layout: sticky sidebar + scrolling main ── */
.layout{max-width:1240px;margin:0 auto;padding:0 20px;display:grid;grid-template-columns:270px 1fr;gap:26px;align-items:start}
.snav{position:sticky;top:calc(var(--topH) + 14px);display:flex;flex-direction:column;gap:12px;max-height:calc(100vh - var(--topH) - 28px);overflow-y:auto;padding:2px 2px 2px 0}
.snav::-webkit-scrollbar{width:4px}.snav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}

.prog-card{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:15px}
.prog-top{display:flex;align-items:baseline;gap:6px}
.prog-top b{font-size:24px;font-weight:800;color:var(--gs)}
.prog-top span{font-size:12px;color:var(--tx2)}
.prog-eta{font-size:11px;color:var(--tx3);margin-top:2px}
.prog-bar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;margin-top:11px;overflow:hidden}
.prog-fill{height:100%;width:0;background:linear-gradient(90deg,#3aa870,var(--gs));border-radius:3px;transition:width .45s ease}
.prefill-btn{margin-top:11px;width:100%;display:flex;align-items:center;justify-content:center;gap:7px;background:rgba(192,132,252,.12);border:1px solid rgba(192,132,252,.34);color:var(--ai);font-size:11.5px;font-weight:700;padding:9px;border-radius:9px;cursor:pointer}
.prefill-btn:hover{background:rgba(192,132,252,.2)}
.prefill-btn.hide{display:none}

.snav-groups{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:8px 0}
.snav-phase{padding:5px 0 2px}
.snav-phase + .snav-phase{border-top:1px solid rgba(255,255,255,.06);margin-top:4px}
.snav-phase-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 14px 4px;font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--tx3)}
.snav-phase-hdr .pc{font-weight:600;letter-spacing:0;font-size:10px;color:var(--tx3)}
.snav-phase-hdr .pc.done{color:var(--gs)}
.snav-item{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;border-left:2px solid transparent;padding:8px 12px 8px 14px;cursor:pointer;text-align:left;color:var(--tx2);font-size:12px;transition:background .12s,color .12s}
.snav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.snav-item.active{background:var(--bl-dim);border-left-color:var(--bl);color:#fff}
.snav-item .lbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.state{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1.6px solid rgba(255,255,255,.28);font-size:9px;color:var(--tx3);transition:all .2s}
.state.done{background:var(--gs);border-color:var(--gs);color:#fff}
.state.part{border-color:var(--amb);color:var(--amb)}
.snav-badge{min-width:17px;height:17px;padding:0 5px;border-radius:9px;font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;background:var(--amb-dim);border:1px solid var(--amb-brd);color:var(--amb)}
.snav-badge.hide{display:none}
@keyframes pop{0%{transform:scale(.5)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
.state.pop{animation:pop .35s ease}

/* ── Full-screen cards ── */
.main{min-width:0}
.sec{min-height:calc(100vh - var(--topH));scroll-snap-align:start;scroll-margin-top:var(--topH);display:flex;flex-direction:column;justify-content:center;padding:40px 6px 120px;position:relative}
.sec-inner{width:100%;max-width:600px;margin:0 auto}
/* entrance animation as the card scrolls into view */
.sec-head,.sec .fields>*{opacity:0;transform:translateY(26px);transition:opacity .5s cubic-bezier(.22,.61,.36,1),transform .5s cubic-bezier(.22,.61,.36,1)}
.sec.in-view .sec-head,.sec.in-view .fields>*{opacity:1;transform:none}
.sec.in-view .sec-head{transition-delay:.02s}
.sec.in-view .fields>*:nth-child(1){transition-delay:.10s}
.sec.in-view .fields>*:nth-child(2){transition-delay:.16s}
.sec.in-view .fields>*:nth-child(3){transition-delay:.22s}
.sec.in-view .fields>*:nth-child(4){transition-delay:.28s}
.sec.in-view .fields>*:nth-child(5){transition-delay:.34s}
.sec.in-view .fields>*:nth-child(6){transition-delay:.40s}

.sec-head{margin-bottom:26px}
.qnum{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--bl);margin-bottom:8px}
.qnum svg{width:14px;height:14px}
.qnum .pill{margin-left:8px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;color:var(--tx3);background:rgba(255,255,255,.06);border:1px solid var(--brd2)}
.qnum .pill.done{color:var(--gs);background:var(--gs-dim);border-color:var(--gs-brd)}
.qnum .pill.todo,.qnum .pill.part{color:var(--amb);background:var(--amb-dim);border-color:var(--amb-brd)}
.q{font-size:clamp(22px,3.2vw,31px);font-weight:800;line-height:1.18;letter-spacing:-.01em}
.qdesc{font-size:14px;color:var(--tx3);margin-top:9px;line-height:1.5}
.fields{display:flex;flex-direction:column;gap:19px}

/* fields */
.tf-field .lbl{display:block;font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:8px}
.req{color:var(--gs);font-weight:700;margin-left:2px}
.hint{font-size:11px;color:var(--tx3);margin-top:6px}
.fi{width:100%;height:50px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.16);border-radius:12px;color:#fff;font-family:inherit;font-size:16px;padding:0 15px;transition:border-color .15s,background .15s}
.fi::placeholder{color:rgba(255,255,255,.32)}
.fi:focus{outline:none;border-color:var(--bl);background:rgba(59,130,246,.06)}
select.fi{cursor:pointer}select.fi option{background:#16294a;color:#fff}
textarea.fi{height:auto;min-height:88px;padding:12px 15px;resize:vertical;line-height:1.5}
.fi-ro{background:rgba(255,255,255,.03);color:rgba(255,255,255,.55);cursor:pointer;height:44px;font-size:14px}
.fi-ro:hover{border-color:var(--bl-brd);color:#fff}
.fi-unlocked{background:rgba(59,130,246,.08)!important;border-color:var(--bl)!important;color:#fff!important;cursor:text}
.fi-wrap{position:relative}
.fi-has-unit{padding-right:52px}
.fi-unit{position:absolute;right:15px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--tx3);pointer-events:none}
.fi.shake{animation:shake .4s;border-color:var(--red)!important}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}

/* choices */
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:rgba(255,255,255,.045);border:1.5px solid rgba(255,255,255,.18);border-radius:12px;padding:13px 15px;cursor:pointer;color:var(--tx);font-size:15px;font-weight:500;transition:all .13s}
.opt:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.07)}
.opt:focus-visible{outline:none;border-color:var(--bl);box-shadow:0 0 0 3px rgba(59,130,246,.25)}
.opt.sel{border-color:var(--gs);background:var(--gs-dim);color:#fff}
.opt .key{flex-shrink:0;width:25px;height:25px;border-radius:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.24);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--tx2)}
.opt.sel .key{background:var(--gs);border-color:var(--gs);color:#fff}
.opt .olbl{flex:1}
.opt .tick{opacity:0;color:var(--gs);font-weight:800}.opt.sel .tick{opacity:1}

/* AI-suggested fields */
.ai-tag{margin-left:6px;font-size:8.5px;font-weight:700;letter-spacing:.04em;color:var(--ai);background:rgba(192,132,252,.14);border:1px solid rgba(192,132,252,.4);border-radius:5px;padding:1px 5px;vertical-align:middle}
.ai-input{padding-right:64px}
.ai-input.ai-on{border-color:rgba(192,132,252,.45)}
.ai-input.ai-on:focus{border-color:var(--ai);background:rgba(192,132,252,.07)}
.ai-input.ai-accepted{border-color:var(--gs)!important;background:rgba(78,187,129,.12)!important}
.ai-ghost{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:16px;font-style:italic;color:rgba(192,132,252,.5);pointer-events:none;display:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 78px)}
.ai-wrap.show-ghost .ai-ghost{display:block}
.ai-badge{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:var(--ai);background:rgba(192,132,252,.16);border:1px solid rgba(192,132,252,.42);border-radius:6px;padding:3px 7px;pointer-events:none;white-space:nowrap;transition:all .15s}
.ai-badge.badge-hint{color:#1a1030;background:var(--ai);border-color:var(--ai)}

.err{color:var(--red);font-size:12.5px;margin-top:14px;min-height:16px;font-weight:600;opacity:0;transition:opacity .15s}
.err.show{opacity:1}

/* per-card continue */
.sec-cta{margin-top:26px;display:flex;align-items:center;gap:14px}
.cta-btn{display:flex;align-items:center;gap:9px;background:var(--gs);border:none;color:#fff;font-size:15px;font-weight:700;padding:12px 22px;border-radius:11px;cursor:pointer;transition:filter .15s}
.cta-btn:hover{filter:brightness(1.08)}
.cta-btn svg{width:15px;height:15px}
.cta-hint{font-size:12px;color:var(--tx3)}.cta-hint b{color:var(--tx2)}

/* ── sticky bottom action bar ── */
.actbar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:60;width:min(1200px,calc(100% - 40px));display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(14,30,56,.94);backdrop-filter:blur(10px);border:1px solid var(--brd2);border-radius:13px;padding:11px 16px;box-shadow:0 10px 34px rgba(0,0,0,.45)}
.saved{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx3)}.saved svg{width:12px;height:12px;color:var(--gs)}
.act-right{display:flex;align-items:center;gap:8px}
.next-inc{background:transparent;border:1px solid var(--brd2);color:var(--tx2);font-size:12px;padding:9px 14px;border-radius:9px;cursor:pointer}
.next-inc:hover{color:#fff;border-color:rgba(255,255,255,.35)}
.submit{border:none;color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:8px}
.submit.locked{background:rgba(255,255,255,.09);color:var(--tx3)}.submit.locked:hover{background:rgba(255,255,255,.13)}
.submit.ready{background:var(--gs)}.submit.ready:hover{filter:brightness(1.08)}
.submit .cnt{background:var(--amb-dim);border:1px solid var(--amb-brd);color:var(--amb);font-size:10px;font-weight:700;padding:1px 7px;border-radius:9px}

.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-12px);background:#16294a;border:1px solid var(--brd2);border-radius:11px;padding:12px 18px;font-size:13px;box-shadow:0 12px 36px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:all .3s;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.good{border-color:var(--gs-brd)}.toast.warn{border-color:var(--amb-brd)}

@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .snav{position:static;max-height:none;flex-direction:row;flex-wrap:wrap}
  .snav-groups{display:none}
  html{scroll-snap-type:none}
}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}*,*::before,*::after{animation:none!important;transition:none!important}.sec-head,.sec .fields>*{opacity:1;transform:none}}
</style>
</head>
<body>

<header class="ph">
  <div class="ph-brand"><b>Primark Stores Ltd</b><span>Packaging compliance portal</span></div>
  <div class="ph-right">
    <span class="ph-sku" id="sku">PRK-003-DRS-RED · Garment polybag</span>
    <span class="ph-due">Due: <strong>26 Jul 2026</strong></span>
  </div>
</header>

<div class="layout">
  <aside class="snav" aria-label="Form sections">
    <div class="prog-card">
      <div class="prog-top"><b id="pDone">0</b><span>of 11 sections complete</span></div>
      <div class="prog-eta" id="pEta">—</div>
      <div class="prog-bar"><div class="prog-fill" id="pFill"></div></div>
      <button class="prefill-btn" id="prefillBtn" onclick="applyPrefill()">✦ Prefill from a similar component</button>
    </div>
    <div class="snav-groups" id="snavGroups"></div>
  </aside>

  <main class="main" id="main"></main>
</div>

<div class="actbar">
  <span class="saved"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="m4.5 12.5 5 5 10-11"/></svg><span id="savedTxt">Draft saved</span></span>
  <div class="act-right">
    <button class="next-inc" id="nextIncBtn" onclick="goNextIncomplete()">Next incomplete ↓</button>
    <button class="submit locked" id="submitBtn" onclick="trySubmit()"><span id="submitLbl">Review &amp; submit</span><span class="cnt" id="submitCnt">— left</span></button>
  </div>
</div>

<div class="toast" id="toast" role="status"></div>

<script>
/* ── Step model (11 sections, grouped into 4 phases) ── */
const STEPS=[
 {t:'Product details', d:'Auto-populated from the style record — click any field to override.', phase:'A', nav:'Product details',
  fields:[
   {type:'ro-grid', items:[['Department','04 Uwear & Nwear'],['Class','04 029 PJ Separates'],['Sub Class','04 029 002 Woven Pyjamas'],['Style Description','Red Midi Dress'],['Style ORIN','991171505']]},
   {type:'text', label:'Additional Style ORINs (same packaging)', ph:'e.g. 991130431; 991130432', hint:'Separate with “;”'}
  ]},
 {t:'How is it packed & palletised?', d:'How the product is packed and shipped in bulk.', phase:'B', nav:'Case packaging',
  fields:[
   {type:'chips', label:'Packing method', name:'packing', req:true, value:'Flat', options:['Flat','Boxed','GOH (garment on hanger)','Hanging']},
   {type:'number', label:'Singles / each per case or box', req:true, value:'35'},
   {type:'number', label:'Cases / boxes per pallet', req:true, value:'30'}
  ]},
 {t:'Packaging level & format', d:'Identify the hierarchy and type of this component.', phase:'B', nav:'Level & format',
  fields:[
   {type:'chips', label:'Packaging level', name:'level', req:true, value:'Primary — touches the product', options:['Primary — touches the product','Secondary — groups units','Tertiary — transport']},
   {type:'select', label:'Packaging type', req:true, value:'Flexible film bag', options:['Flexible film bag','Rigid box / carton','Hanger','Label / tag','Wrap / band','Other']},
   {type:'text', label:'Other type description', ph:'Only if “Other” selected'}
  ]},
 {t:'Who supplies this packaging?', d:'Who manufactures or supplies this packaging component.', phase:'B', nav:'Source type',
  fields:[
   {type:'chips', label:'Packaging source type', name:'source', req:true, value:'Supplier-manufactured', options:['Supplier-manufactured','Third-party converter','Primark-nominated source']}
  ]},
 {t:'Material information', d:'Composition by material and percentage weight (must total 100%).', phase:'C', nav:'Materials',
  fields:[
   {type:'select', label:'Base material', req:true, value:'Plastic', options:['Plastic','Paper / board','Metal','Glass','Composite']},
   {type:'chips', label:'Number of materials', name:'nummat', req:true, value:'2', options:['1','2','3','4']},
   {type:'text', label:'Material 1 name', ph:'e.g. LDPE film', req:true},
   {type:'number', label:'% Material 1', unit:'%', req:true},
   {type:'text', label:'Material 2 name', ph:'e.g. Paper label'},
   {type:'number', label:'% Material 2', unit:'%'}
  ]},
 {t:'Recycled content', d:'PPWR Article 7 recycled-content declarations.', phase:'C', nav:'Recycled content',
  fields:[
   {type:'chips', label:'Does this component contain recycled content?', name:'recycled', req:true, options:['Yes','No']},
   {type:'number', label:'Post-consumer recycled content', unit:'%', id:'pcr', hint:'Required when recycled content = Yes'},
   {type:'number', label:'Post-industrial recycled content', unit:'%'},
   {type:'textarea', label:'Additional comments', ph:'Anything the compliance team should know'}
  ]},
 {t:'Colour & decoration', d:'Visual properties of this packaging component.', phase:'C', nav:'Colour',
  fields:[
   {type:'ai', label:'Colour reference', ai:'PMS Cool Gray 1C', hint:'Focus the field and press Tab to accept — or type your own'},
   {type:'chips', label:'Opacity / transparency', name:'opacity', req:true, options:['Transparent','Translucent','Opaque']},
   {type:'chips', label:'Decoration / printing', name:'deco', req:true, options:['None','1-colour print','2-colour print','Full print']}
  ]},
 {t:'Weight & grammage', d:'Physical weight properties of this component.', phase:'C', nav:'Weight',
  fields:[
   {type:'number', label:'Weight per unit', unit:'g', req:true, ph:'e.g. 6.2'},
   {type:'number', label:'Grammage', unit:'gsm', req:true, ph:'e.g. 46'},
   {type:'number', label:'Gauge', unit:'µm', ph:'e.g. 50 — film only'}
  ]},
 {t:'Material dimensions', d:'Flat / unassembled dimensions of this component.', phase:'C', nav:'Dimensions',
  fields:[
   {type:'number', label:'Length (or diameter)', unit:'mm', req:true, ph:'e.g. 400'},
   {type:'number', label:'Width', unit:'mm', req:true, ph:'e.g. 320'},
   {type:'number', label:'Height / depth', unit:'mm', ph:'Leave blank for flat components'},
   {type:'ai', label:'Wall thickness / gauge (µm)', ai:'18', hint:'Suggested from similar film components — Tab to accept'}
  ]},
 {t:'Additional information', d:'Certifications and packaging supplier details.', phase:'D', nav:'Additional info',
  fields:[
   {type:'select', label:'Certification', req:true, options:['GRS','RCS','FSC','None','Other']},
   {type:'text', label:'Other certification details', ph:'Only if “Other” selected'},
   {type:'text', label:'Packaging supplier name', req:true, ph:'Company name'},
   {type:'text', label:'Packaging supplier address', req:true, ph:'Street, city, country'},
   {type:'ai', label:'Country of manufacture', ai:'China (CN)', hint:'Inferred from the supplier address — Tab to accept or edit'}
  ]},
 {t:'Material compliance', d:'Chemical and substance compliance declarations.', phase:'D', nav:'Compliance',
  fields:[
   {type:'select', label:'Compliance standard', req:true, options:['EU PPWR / REACH','UK Packaging Regs','Both EU & UK']},
   {type:'chips', label:'Mineral oils above limits?', name:'minoil', req:true, options:['Yes','No']},
   {type:'chips', label:'BPA above limits?', name:'bpa', req:true, options:['Yes','No']},
   {type:'chips', label:'Contains PFAs?', name:'pfas', req:true, options:['Yes','No']},
   {type:'chips', label:'Chlorine used in manufacture?', name:'chlorine', req:true, options:['Yes','No']}
  ]}
];
const PHASES={A:{label:'Product info',ids:[]},B:{label:'Packaging setup',ids:[]},C:{label:'Materials & specs',ids:[]},D:{label:'Finalise',ids:[]}};
const N=STEPS.length;
STEPS.forEach((s,i)=>PHASES[s.phase].ids.push('sec'+i));
let submitted=false;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* ── render ── */
function fieldHTML(f){
  const req=f.req?'<span class="req">*</span>':'';
  const hint=f.hint?`<div class="hint">${esc(f.hint)}</div>`:'';
  if(f.type==='ro-grid'){
    const rows=f.items.map(([k,v])=>`<div class="tf-field"><span class="lbl">${esc(k)}</span><input class="fi fi-ro" value="${esc(v)}" readonly></div>`).join('');
    return `<div class="tf-field"><div class="grid2">${rows}</div></div>`;
  }
  if(f.type==='chips'){
    const opts=f.options.map((o,oi)=>{const L=String.fromCharCode(65+oi),sel=(f.value===o)?' sel':'';
      return `<button type="button" class="opt${sel}" data-k="${L}" data-val="${esc(o)}" role="radio" aria-checked="${f.value===o}" tabindex="${oi===0?0:-1}" onclick="selectOpt(this)"><span class="key">${L}</span><span class="olbl">${esc(o)}</span><span class="tick">✓</span></button>`;}).join('');
    return `<div class="tf-field" data-req="${f.req?1:0}" data-kind="chips" data-name="${f.name||''}"><span class="lbl">${esc(f.label)}${req}</span><div class="opts" role="radiogroup">${opts}</div>${hint}</div>`;
  }
  if(f.type==='select'){
    const ph=f.value?'':'<option value="" disabled selected>Select…</option>';
    const opts=f.options.map(o=>`<option${o===f.value?' selected':''}>${esc(o)}</option>`).join('');
    return `<div class="tf-field" data-req="${f.req?1:0}"><span class="lbl">${esc(f.label)}${req}</span><select class="fi">${ph}${opts}</select>${hint}</div>`;
  }
  if(f.type==='textarea'){
    return `<div class="tf-field" data-req="${f.req?1:0}"><span class="lbl">${esc(f.label)}${req}</span><textarea class="fi" placeholder="${esc(f.ph||'')}"></textarea>${hint}</div>`;
  }
  if(f.type==='ai'){
    return `<div class="tf-field" data-req="0"><span class="lbl">${esc(f.label)}<span class="ai-tag">AI</span></span><div class="fi-wrap ai-wrap"><input class="fi ai-input" data-ai="${esc(f.ai)}" autocomplete="off"><span class="ai-ghost"></span><span class="ai-badge">✦ AI</span></div>${hint}</div>`;
  }
  const unit=f.unit?`<span class="fi-unit">${esc(f.unit)}</span>`:'';
  const cls='fi'+(f.unit?' fi-has-unit':'');
  const id=f.id?` id="${f.id}"`:'';
  const val=f.value!=null?` value="${esc(f.value)}"`:'';
  const type=f.type==='number'?'number':'text';
  return `<div class="tf-field" data-req="${f.req?1:0}"><span class="lbl">${esc(f.label)}${req}</span><div class="fi-wrap"><input${id} type="${type}" class="${cls}" placeholder="${esc(f.ph||'')}"${val}>${unit}</div>${hint}</div>`;
}

function build(){
  document.getElementById('main').innerHTML=STEPS.map((s,i)=>{
    const last=i===N-1;
    const fields=s.fields.map(fieldHTML).join('');
    const cta=last
      ? `<div class="sec-cta"><button class="cta-btn" onclick="trySubmit()">Review &amp; submit <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M20 6 9 17l-5-5"/></svg></button></div>`
      : `<div class="sec-cta"><button class="cta-btn" onclick="continueFrom(${i})">Continue <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14m0 0 6-6m-6 6-6-6"/></svg></button><span class="cta-hint">or press <b>Enter ↵</b></span></div>`;
    return `<section class="sec" id="sec${i}" data-num="${i+1}">
      <div class="sec-inner">
        <div class="sec-head">
          <div class="qnum">${i+1}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="m9 6 6 6-6 6"/></svg><span class="pill" data-pill="${i}"></span></div>
          <h1 class="q">${esc(s.t)}</h1>
          <p class="qdesc">${esc(s.d)}</p>
        </div>
        <div class="fields">${fields}</div>
        <div class="err" id="err-${i}"></div>
        ${cta}
      </div>
    </section>`;
  }).join('');

  // sidebar
  let html='';
  for(const [ph,obj] of Object.entries(PHASES)){
    html+=`<div class="snav-phase" data-phase="${ph}"><div class="snav-phase-hdr"><span>${esc(obj.label)}</span><span class="pc" data-pc="${ph}">0/${obj.ids.length}</span></div>`;
    obj.ids.forEach(id=>{const i=+id.slice(3);
      html+=`<button class="snav-item" data-target="${id}"><span class="state" data-st="${id}"></span><span class="lbl">${esc(STEPS[i].nav)}</span><span class="snav-badge hide" data-bd="${id}"></span></button>`;});
    html+='</div>';
  }
  document.getElementById('snavGroups').innerHTML=html;

  // read-only click-to-edit
  document.querySelectorAll('.fi-ro').forEach(inp=>{inp.title='Click to edit';inp.addEventListener('mousedown',unlockRo);inp.addEventListener('focus',unlockRo);});
}
function unlockRo(e){const i=e.currentTarget;if(!i.readOnly)return;i.readOnly=false;i.classList.remove('fi-ro');i.classList.add('fi-unlocked');i.removeAttribute('title');i.focus();try{const l=i.value.length;i.setSelectionRange(l,l)}catch(_){}}

/* ── validation / completeness ── */
function radioSel(sec,name){return sec.querySelector(`[data-name="${name}"] .opt.sel`)}
function missingIn(i){
  const sec=document.getElementById('sec'+i); let n=0;
  sec.querySelectorAll('.tf-field').forEach(fld=>{
    if(fld.dataset.req!=='1') return;
    if(fld.dataset.kind==='chips'){ if(!fld.querySelector('.opt.sel')) n++; return; }
    const c=fld.querySelector('input.fi,select.fi,textarea.fi'); if(c && !String(c.value).trim()) n++;
  });
  if(i===5){ const rec=radioSel(sec,'recycled'); const pcr=document.getElementById('pcr'); if(rec&&rec.dataset.val==='Yes'&&pcr&&!pcr.value.trim()) n++; }
  return n;
}
function firstBadIn(i){
  const sec=document.getElementById('sec'+i); let bad=null;
  sec.querySelectorAll('.tf-field').forEach(fld=>{ if(bad||fld.dataset.req!=='1')return;
    if(fld.dataset.kind==='chips'){ if(!fld.querySelector('.opt.sel')) bad=fld.querySelector('.opt'); return; }
    const c=fld.querySelector('input.fi,select.fi,textarea.fi'); if(c&&!String(c.value).trim()) bad=c; });
  if(!bad&&i===5){const rec=radioSel(sec,'recycled');const pcr=document.getElementById('pcr');if(rec&&rec.dataset.val==='Yes'&&pcr&&!pcr.value.trim())bad=pcr;}
  return bad;
}

function recompute(popId){
  let done=0,totalMissing=0;
  for(let i=0;i<N;i++){
    const sec=document.getElementById('sec'+i);
    const miss=missingIn(i); totalMissing+=miss;
    const touched=sec.dataset.touched==='1';
    const complete=miss===0; if(complete)done++;
    const pill=sec.querySelector('[data-pill="'+i+'"]');
    if(i===0&&complete){pill.textContent='Auto-filled ✓';pill.className='pill done';}
    else if(complete){pill.textContent='Complete ✓';pill.className='pill done';}
    else if(touched){pill.textContent=miss+' field'+(miss>1?'s':'')+' missing';pill.className='pill part';}
    else{pill.textContent=miss+' required';pill.className='pill todo';}
    const st=document.querySelector(`[data-st="sec${i}"]`), bd=document.querySelector(`[data-bd="sec${i}"]`);
    if(complete){ if(!st.classList.contains('done')&&popId==='sec'+i)st.classList.add('pop');
      st.className='state done'+(popId==='sec'+i?' pop':''); st.innerHTML='<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4"><path d="m4.5 12.5 5 5 10-11"/></svg>'; bd.classList.add('hide'); }
    else{ st.className='state'+(touched?' part':''); st.innerHTML=''; bd.textContent=miss; bd.classList.remove('hide'); }
  }
  for(const [ph,obj] of Object.entries(PHASES)){
    const d=obj.ids.filter(id=>missingIn(+id.slice(3))===0).length;
    const el=document.querySelector(`[data-pc="${ph}"]`); el.textContent=d+'/'+obj.ids.length; el.classList.toggle('done',d===obj.ids.length);
  }
  document.getElementById('pDone').textContent=done;
  document.getElementById('pFill').style.width=(done/N*100)+'%';
  const rem=N-done;
  document.getElementById('pEta').textContent = submitted?'Submitted for review' : rem===0?'All sections complete — ready to submit' : ('~'+Math.max(1,Math.round(rem*35/60))+' min of work remaining');
  const btn=document.getElementById('submitBtn'),cnt=document.getElementById('submitCnt');
  if(submitted){btn.className='submit ready';cnt.style.display='none';document.getElementById('submitLbl').textContent='Submitted ✓';}
  else if(rem===0){btn.className='submit ready';cnt.style.display='none';}
  else{btn.className='submit locked';cnt.style.display='';cnt.textContent=rem+' left';}
  document.getElementById('nextIncBtn').style.display=(rem===0||submitted)?'none':'';
  return rem;
}

/* ── scroll to a section (animated) ── */
function scrollToSec(i){const sec=document.getElementById('sec'+i);if(sec)sec.scrollIntoView({behavior:'smooth',block:'start'});}
function continueFrom(i){
  const bad=firstBadIn(i);
  if(bad){ shake(bad); showErr(i,'Please complete this before continuing.'); return; }
  clearErr(i);
  if(i<N-1){ scrollToSec(i+1); setTimeout(()=>focusFirst(i+1),480); }
}
function goNextIncomplete(){ for(let i=0;i<N;i++){ if(missingIn(i)>0){ scrollToSec(i); setTimeout(()=>focusFirst(i),480); return; } } }
function focusFirst(i){
  const sec=document.getElementById('sec'+i);
  const el=[...sec.querySelectorAll('.opt, input.fi:not([readonly]), select.fi, textarea.fi')].find(e=>{
    if(e.offsetParent===null)return false;
    if(e.classList.contains('opt'))return true;
    if(e.tagName==='SELECT')return !e.value;
    return !e.value.trim();});
  if(el){try{el.focus({preventScroll:true})}catch(_){el.focus()}}
}
function shake(el){if(!el)return;el.classList.remove('shake');void el.offsetWidth;el.classList.add('shake');try{el.focus({preventScroll:true})}catch(_){}setTimeout(()=>el.classList.remove('shake'),450);}
function showErr(i,m){const e=document.getElementById('err-'+i);if(e){e.textContent=m;e.classList.add('show');}}
function clearErr(i){const e=document.getElementById('err-'+i);if(e)e.classList.remove('show');}

/* ── choices ── */
function selectOpt(btn){
  const grp=btn.closest('.opts');
  grp.querySelectorAll('.opt').forEach(o=>{o.classList.remove('sel');o.setAttribute('aria-checked','false');o.tabIndex=-1;});
  btn.classList.add('sel');btn.setAttribute('aria-checked','true');btn.tabIndex=0;
  const sec=btn.closest('.sec'); sec.dataset.touched='1';
  const i=+sec.id.slice(3);
  const wasComplete=sec.dataset.wc==='1'; const nowComplete=missingIn(i)===0;
  recompute(nowComplete&&!wasComplete?sec.id:null); sec.dataset.wc=nowComplete?'1':'0';
  clearErr(i); autosave();
  const step=STEPS[i];
  if(step&&step.fields.length===1&&step.fields[0].type==='chips'&&nowComplete&&i<N-1){ setTimeout(()=>continueFrom(i),340); }
}

/* ── AI fields ── */
function initAIFields(){
  document.querySelectorAll('.ai-input').forEach(inp=>{
    const wrap=inp.closest('.ai-wrap'),ghost=wrap.querySelector('.ai-ghost'),badge=wrap.querySelector('.ai-badge'),sugg=inp.dataset.ai||'';
    ghost.textContent=sugg; inp.classList.add('ai-on');
    const update=()=>{const empty=!inp.value.trim(),foc=document.activeElement===inp;wrap.classList.toggle('show-ghost',empty);if(badge){badge.textContent=(empty&&foc)?'Tab ⇥':'✦ AI';badge.classList.toggle('badge-hint',empty&&foc);}};
    inp.addEventListener('focus',update);inp.addEventListener('blur',update);inp.addEventListener('input',update);
    inp.addEventListener('keydown',ev=>{ if(ev.key==='Tab'&&!ev.shiftKey&&sugg&&!inp.value.trim()){ inp.value=sugg;inp.classList.add('ai-accepted');setTimeout(()=>inp.classList.remove('ai-accepted'),750);inp.dispatchEvent(new Event('input',{bubbles:true}));inp.dispatchEvent(new Event('change',{bubbles:true}));update(); } });
    update();
  });
}

/* ── autosave + completion auto-advance ── */
let saveT;
function autosave(){const s=document.getElementById('savedTxt');s.textContent='Saving…';clearTimeout(saveT);saveT=setTimeout(()=>s.textContent='Draft saved',650);}
document.addEventListener('input',onEdit,true);
document.addEventListener('change',onEdit,true);
function onEdit(e){
  const sec=e.target.closest&&e.target.closest('.sec'); if(!sec)return;
  sec.dataset.touched='1';
  const i=+sec.id.slice(3);
  const wasComplete=sec.dataset.wc==='1'; const nowComplete=missingIn(i)===0;
  recompute(nowComplete&&!wasComplete?sec.id:null); sec.dataset.wc=nowComplete?'1':'0';
  const s=document.getElementById('savedTxt'); s.textContent='Saving…'; clearTimeout(saveT); saveT=setTimeout(()=>s.textContent='Draft saved',650);
  if(nowComplete&&!wasComplete&&e.type==='change'&&!submitted&&i<N-1){ setTimeout(()=>continueFrom(i),260); }
}

/* ── keyboard: Enter → continue (Shift+Enter newline in textarea); options nav ── */
document.addEventListener('keydown',e=>{
  const t=document.activeElement;
  if(e.key==='Enter'){
    const ta=t&&t.tagName==='TEXTAREA'; if(ta&&e.shiftKey)return;
    const sec=t&&t.closest&&t.closest('.sec'); if(!sec)return;
    e.preventDefault(); continueFrom(+sec.id.slice(3)); return;
  }
  const grp=(t&&t.classList&&t.classList.contains('opt'))?t.closest('.opts'):null;
  if(grp){
    const opts=[...grp.querySelectorAll('.opt')];let idx=opts.indexOf(t);
    if(e.key==='ArrowDown'||e.key==='ArrowRight'){e.preventDefault();idx=Math.min(opts.length-1,idx+1);opts[idx].focus();selectOpt(opts[idx]);}
    else if(e.key==='ArrowUp'||e.key==='ArrowLeft'){e.preventDefault();idx=Math.max(0,idx-1);opts[idx].focus();selectOpt(opts[idx]);}
    else if(e.key===' '){e.preventDefault();selectOpt(t);}
    else if(/^[a-zA-Z]$/.test(e.key)){const o=opts.find(x=>x.dataset.k===e.key.toUpperCase());if(o){e.preventDefault();o.focus();selectOpt(o);}}
  }
});

/* ── scroll-spy: active nav + entrance animation ── */
function initObserver(){
  const io=new IntersectionObserver(entries=>{
    entries.forEach(en=>{ if(en.isIntersecting) en.target.classList.add('in-view'); });
    // active = most-visible section
    let best=null,bestR=0;
    document.querySelectorAll('.sec').forEach(s=>{const r=s.getBoundingClientRect();const vh=innerHeight;const vis=Math.max(0,Math.min(r.bottom,vh)-Math.max(r.top,0));if(vis>bestR){bestR=vis;best=s.id;}});
    if(best) document.querySelectorAll('.snav-item').forEach(b=>b.classList.toggle('active',b.dataset.target===best));
  },{threshold:[0,.25,.5,.75]});
  document.querySelectorAll('.sec').forEach(s=>io.observe(s));
}

/* ── sidebar nav click ── */
function wireNav(){document.querySelectorAll('.snav-item').forEach(b=>b.addEventListener('click',()=>{const i=+b.dataset.target.slice(3);scrollToSec(i);setTimeout(()=>focusFirst(i),480);}));}

/* ── prefill (copy-from-similar) ── */
function setVal(sel,v){const el=document.querySelector(sel);if(el){el.value=v;}}
function pickChip(sec,name,val){const o=document.querySelector(`#sec${sec} [data-name="${name}"] .opt[data-val="${val}"]`);if(o)selectOpt(o);}
function applyPrefill(){
  // materials (sec4)
  const t5=[...document.querySelectorAll('#sec4 input.fi')];
  const texts=t5.filter(x=>x.type==='text'), nums=t5.filter(x=>x.type==='number');
  if(texts[0])texts[0].value='LDPE film'; if(nums[0])nums[0].value='90'; if(texts[1])texts[1].value='Paper label'; if(nums[1])nums[1].value='10';
  pickChip(5,'recycled','Yes'); setVal('#pcr','20');
  pickChip(6,'opacity','Transparent'); pickChip(6,'deco','1-colour print');
  const w=[...document.querySelectorAll('#sec7 input.fi')]; if(w[0])w[0].value='9.8'; if(w[1])w[1].value='46'; if(w[2])w[2].value='55';
  const dm=[...document.querySelectorAll('#sec8 input.fi:not(.ai-input)')]; if(dm[0])dm[0].value='380'; if(dm[1])dm[1].value='300';
  const sel10=document.querySelector('#sec9 select.fi'); if(sel10)sel10.value='GRS';
  const txt10=[...document.querySelectorAll('#sec9 input.fi:not(.ai-input)')]; if(txt10[1])txt10[1].value='FlexPack Converting Ltd'; if(txt10[2])txt10[2].value='12 Baoan District, Shenzhen, CN';
  const std=document.querySelector('#sec10 select.fi'); if(std)std.value='EU PPWR / REACH';
  ['minoil','bpa','pfas','chlorine'].forEach(n=>pickChip(10,n,'No'));
  document.querySelectorAll('.sec').forEach(s=>{s.dataset.touched='1';});
  document.getElementById('prefillBtn').classList.add('hide');
  recompute(); document.querySelectorAll('.sec').forEach(s=>s.dataset.wc=missingIn(+s.id.slice(3))===0?'1':'0');
  toast('Prefilled from PRK-002-JN-BLU — review the values, then submit','good');
}

/* ── submit ── */
function trySubmit(){
  if(submitted)return;
  let rem=0;for(let i=0;i<N;i++)if(missingIn(i)>0)rem++;
  if(rem>0){toast(rem+' section'+(rem>1?'s':'')+' still need attention — jumping to the first','warn');goNextIncomplete();return;}
  submitted=true;recompute();document.getElementById('sku').textContent='PRK-003-DRS-RED · Submitted';
  toast('PRK-003-DRS-RED submitted for compliance review ✓','good');window.scrollTo({top:0,behavior:'smooth'});
}

/* ── toast ── */
let toastT;function toast(m,k){const el=document.getElementById('toast');el.textContent=m;el.className='toast show '+(k||'');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),3200);}

/* ── init ── */
build();
initAIFields();
initObserver();
wireNav();
['sec0','sec1','sec2','sec3'].forEach(id=>document.getElementById(id).dataset.touched='1');
document.querySelectorAll('.sec').forEach(s=>s.dataset.wc=missingIn(+s.id.slice(3))===0?'1':'0');
document.getElementById('sec0').classList.add('in-view');
recompute();
</script>
