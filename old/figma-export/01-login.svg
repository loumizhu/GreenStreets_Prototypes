<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <defs>
    <!-- body background: layered radial glows over a navy diagonal gradient -->
    <linearGradient id="bgBase" x1="0" y1="0" x2="1440" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#081321"/><stop offset=".38" stop-color="#0b1a30"/>
      <stop offset=".72" stop-color="#0a1626"/><stop offset="1" stop-color="#081120"/>
    </linearGradient>
    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(115 -72) scale(900 620)">
      <stop stop-color="#4ebb81" stop-opacity=".20"/><stop offset=".6" stop-color="#4ebb81" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1555 54) scale(760 720)">
      <stop stop-color="#5b9cf6" stop-opacity=".16"/><stop offset=".58" stop-color="#5b9cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBottom" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(662 1062) scale(900 700)">
      <stop stop-color="#3766b0" stop-opacity=".22"/><stop offset=".6" stop-color="#3766b0" stop-opacity="0"/>
    </radialGradient>
    <!-- login card zones -->
    <linearGradient id="logoZone" x1="531" y1="230" x2="909" y2="352" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4ebb81" stop-opacity=".13"/><stop offset=".55" stop-color="#5b9cf6" stop-opacity=".10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".02"/>
    </linearGradient>
    <linearGradient id="formZone" x1="720" y1="352" x2="740" y2="672" gradientUnits="userSpaceOnUse">
      <stop stop-color="#091426" stop-opacity=".86"/><stop offset="1" stop-color="#0b1a2e" stop-opacity=".92"/>
    </linearGradient>
    <linearGradient id="btnP" x1="557" y1="600" x2="883" y2="642" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8fe3b6"/><stop offset=".45" stop-color="#4ebb81"/><stop offset="1" stop-color="#43b3ad"/>
    </linearGradient>
    <clipPath id="cardClip"><rect x="531" y="230" width="378" height="442" rx="18"/></clipPath>
  </defs>

  <!-- background -->
  <rect width="1440" height="900" fill="#070f1c"/>
  <rect width="1440" height="900" fill="url(#bgBase)"/>
  <rect width="1440" height="900" fill="url(#glowGreen)"/>
  <rect width="1440" height="900" fill="url(#glowBlue)"/>
  <rect width="1440" height="900" fill="url(#glowBottom)"/>

  <!-- login card -->
  <g clip-path="url(#cardClip)">
    <rect x="531" y="230" width="378" height="122" fill="url(#logoZone)"/>
    <rect x="531" y="352" width="378" height="320" fill="url(#formZone)"/>
    <line x1="531" y1="352" x2="909" y2="352" stroke="#94b4e6" stroke-opacity=".16"/>
    <!-- logo (placeholder wordmark — swap for img/logo asset in Figma) -->
    <text x="720" y="288" text-anchor="middle" font-size="24" font-weight="800" fill="#8fe3b6" letter-spacing="-0.5">greenstreets</text>
    <text x="720" y="312" text-anchor="middle" font-size="9.5" font-weight="700" letter-spacing="2.2" fill="#8fe3b6" opacity=".8">SUPPLIER PORTAL</text>

    <!-- form zone -->
    <text x="720" y="392" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff" letter-spacing="-0.2">Luntai Packaging Co.</text>
    <text x="720" y="410" text-anchor="middle" font-size="11" fill="#ffffff" fill-opacity=".44">Supplier packaging compliance portal</text>

    <!-- SSO buttons -->
    <g>
      <rect x="557" y="428" width="159" height="38" rx="10" fill="#ffffff" fill-opacity=".04" stroke="#94b4e6" stroke-opacity=".26"/>
      <g transform="translate(600 440) scale(0.58)">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </g>
      <text x="622" y="451" font-size="12" fill="#ffffff" fill-opacity=".74">Google</text>

      <rect x="724" y="428" width="159" height="38" rx="10" fill="#ffffff" fill-opacity=".04" stroke="#94b4e6" stroke-opacity=".26"/>
      <g transform="translate(758 440) scale(0.58)" fill="#0078d4">
        <path d="M0 0h11.5v11.5H0zm12.5 0H24v11.5H12.5zM0 12.5h11.5V24H0zm12.5 0H24V24H12.5z"/>
      </g>
      <text x="780" y="451" font-size="12" fill="#ffffff" fill-opacity=".74">Microsoft</text>
    </g>

    <!-- divider -->
    <line x1="557" y1="486" x2="702" y2="486" stroke="#94b4e6" stroke-opacity=".26"/>
    <text x="720" y="490" text-anchor="middle" font-size="11" fill="#ffffff" fill-opacity=".44">or</text>
    <line x1="738" y1="486" x2="883" y2="486" stroke="#94b4e6" stroke-opacity=".26"/>

    <!-- inputs -->
    <rect x="557" y="504" width="326" height="40" rx="10" fill="#ffffff" fill-opacity=".045" stroke="#94b4e6" stroke-opacity=".16"/>
    <text x="570" y="528" font-size="13" fill="#ffffff" fill-opacity=".26">you@luntaipackaging.com</text>
    <rect x="557" y="554" width="326" height="40" rx="10" fill="#ffffff" fill-opacity=".045" stroke="#94b4e6" stroke-opacity=".16"/>
    <text x="570" y="578" font-size="13" fill="#ffffff" fill-opacity=".26">Password</text>

    <!-- primary button -->
    <rect x="557" y="610" width="326" height="42" rx="10" fill="url(#btnP)"/>
    <g transform="translate(614 625)" stroke="#04160e" stroke-width="2" fill="none">
      <path d="M8.1 1.6h2.2a1.1 1.1 0 0 1 1.1 1.1v7.7a1.1 1.1 0 0 1-1.1 1.1H8.1M5.4 9.4l2.8-2.8-2.8-2.8M8.2 6.6H1.6"/>
    </g>
    <text x="632" y="635" font-size="13" font-weight="600" fill="#04160e">Access supplier portal</text>
  </g>
  <!-- card border + glow contour -->
  <rect x="531.5" y="230.5" width="377" height="441" rx="17.5" stroke="#94b4e6" stroke-opacity=".26"/>
  <rect x="531.5" y="230.5" width="377" height="441" rx="17.5" stroke="#8fe3b6" stroke-opacity=".35" stroke-width="1.5"/>
</svg>
