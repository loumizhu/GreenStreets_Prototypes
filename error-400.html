<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>400 · Bad Request — Greenstreets</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/greenstreets-theme.css?v=23">
<style>
  /* Page-specific: error card layout, reusing the shared login-card glass shell */
  .err-card{width:440px;max-width:100%}
  .err-logo-zone{padding:26px 30px 6px;text-align:center;position:relative}
  .err-body-zone{padding:8px 34px 34px;position:relative;text-align:center}
  .err-code{
    font-size:88px;line-height:.95;font-weight:700;letter-spacing:-.03em;
    background:linear-gradient(150deg,var(--gs-l),var(--blue,#5aa9ff));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    margin:6px 0 2px;filter:drop-shadow(0 4px 18px rgba(90,169,255,.18))
  }
  .err-badge{
    display:inline-flex;align-items:center;gap:7px;font-size:10px;font-weight:700;
    letter-spacing:.14em;text-transform:uppercase;color:var(--amber);
    background:rgba(240,180,80,.12);border:1px solid rgba(240,180,80,.28);
    padding:5px 11px;border-radius:100px;margin-bottom:4px
  }
  .err-title{font-size:19px;font-weight:700;letter-spacing:-.01em;margin:10px 0 6px}
  .err-sub{font-size:12.5px;color:var(--tw3);line-height:1.6;margin:0 auto 22px;max-width:340px}
  .err-actions{display:flex;flex-direction:column;gap:10px}
  .err-actions .btn-p,.err-actions .btn-g{width:100%;justify-content:center}
  .err-hint{font-size:11px;color:var(--tw3);margin-top:18px;line-height:1.5}
  .err-hint a{color:var(--gs-l);text-decoration:none;font-weight:600}
  .err-hint a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="screen on">
  <div class="login-wrap">
    <div class="login-bg-img on"></div>

    <div class="login-card err-card">
      <div class="login-logo-zone err-logo-zone">
        <div class="zone-spotlight"></div>
        <div class="login-eyebrow">Greenstreets</div>
        <img class="gs-logo-img" src="https://greenstreets.ie/wp-content/uploads/sites/2/2026/04/Logo-WG.png" alt="Greenstreets">
      </div>

      <div class="login-form-zone err-body-zone">
        <div class="zone-spotlight"></div>

        <div class="err-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Bad request
        </div>

        <div class="err-code">400</div>
        <div class="err-title">We couldn't process that request</div>
        <div class="err-sub">The request was malformed or contained invalid data, so the server couldn't understand it. Try again, or head back to the portal and start over.</div>

        <div class="err-actions">
          <button class="btn-p" onclick="location.href='01-Greenstreets_GreenStreets_Admin_v7.html'">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12l9-9 9 9M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"/></svg>
            Return to main portal
          </button>
          <button class="btn-g" onclick="location.href='mailto:support@greenstreets.ie?subject=Support%20request%20%E2%80%93%20Error%20400'">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
            Contact administrator
          </button>
        </div>

        <div class="err-hint">Error 400 · If this keeps happening, reach us at <a href="mailto:support@greenstreets.ie">support@greenstreets.ie</a></div>
      </div>
    </div>
  </div>
</div>

<script src="js/greenstreets-theme.js?v=23"></script>
</body>
</html>
