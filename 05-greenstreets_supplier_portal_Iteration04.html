<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Greenstreets — Supplier Portal · Typeform-style wizard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════
   ITERATION — full-screen, Typeform-style packaging wizard
   Rebuilds the 11-step form from 04 v7 as:
   · one big step per screen, centred, generous typography
   · a clear step rail across the top (current step ripples)
   · full keyboard flow: Enter = continue, A–D pick a choice,
     ↑/↓ move between choices, ⌥←/⌥→ jump steps, Tab within fields
   Theme tokens carried over from v7.
   ══════════════════════════════════════════════════════════════ */
:root{
  --gs:#4ebb81; --gs-dim:rgba(78,187,129,.14); --gs-brd:rgba(78,187,129,.34);
  --bl:#3b82f6; --bl-dim:rgba(59,130,246,.14); --bl-brd:rgba(59,130,246,.45);
  --amb:#f5a623; --red:#f87171; --ai:#c084fc;
  --tx:#fff; --tx2:rgba(255,255,255,.72); --tx3:rgba(255,255,255,.5);
  --card:rgba(255,255,255,.05); --brd:rgba(255,255,255,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:"Inter",sans-serif;color:var(--tx);background:linear-gradient(160deg,#0e2040 0%,#102448 45%,#0c1a2e 100%);display:flex;flex-direction:column;overflow:hidden}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--bl);outline-offset:3px}

/* ── Top bar: brand + step rail + progress ── */
.top{flex-shrink:0;background:rgba(12,24,46,.86);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08)}
.top-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:11px 22px}
.brand b{font-size:15px;font-weight:700}
.brand span{display:block;font-size:10px;color:var(--tx3)}
.top-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.sku{font-size:10px;background:var(--gs-dim);color:var(--gs);border:1px solid rgba(78,187,129,.25);padding:3px 8px;border-radius:5px;font-weight:600}
.due{font-size:11px;color:var(--tx3)}.due strong{color:var(--amb)}

/* step rail */
.rail{display:flex;align-items:flex-start;gap:0;padding:4px 22px 12px;overflow-x:auto;scrollbar-width:none}
.rail::-webkit-scrollbar{display:none}
.rnode{display:flex;flex-direction:column;align-items:center;gap:5px;flex:0 0 auto;background:none;border:none;cursor:pointer;padding:0;width:78px}
.rline{flex:1 1 auto;height:2px;min-width:10px;background:rgba(255,255,255,.12);margin:11px 0 0;align-self:flex-start;transition:background .3s}
.rline.done{background:var(--gs)}
.rdot{position:relative;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--tx3);background:rgba(255,255,255,.06);border:1.7px solid rgba(255,255,255,.22);transition:all .25s}
.rdot.done{background:var(--gs);border-color:var(--gs);color:#fff}
.rdot.curr{border-color:var(--bl);color:#fff;background:var(--bl-dim);box-shadow:0 0 0 4px rgba(59,130,246,.14)}
/* ripple on the current step */
.rdot.curr::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--bl);pointer-events:none;animation:ripple 1.4s ease-out infinite}
@keyframes ripple{0%{transform:scale(.72);opacity:.85}100%{transform:scale(2.15);opacity:0}}
.rlbl{font-size:9.5px;font-weight:600;color:var(--tx3);white-space:nowrap;max-width:74px;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.rnode.is-curr .rlbl{color:#fff}
.rnode.is-done .rlbl{color:var(--gs)}
.rnode:hover .rlbl{color:var(--tx)}
.pbar{height:3px;background:rgba(255,255,255,.08)}
.pbar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--bl),#60a5fa);transition:width .45s ease}

/* ── Stage: one step at a time ── */
.stage{flex:1 1 auto;position:relative;overflow:hidden}
.step{position:absolute;inset:0;display:none;overflow-y:auto;padding:5vh 24px 130px}
.step.on{display:flex;flex-direction:column;justify-content:center;align-items:center}
.step-in-next{animation:inNext .45s cubic-bezier(.22,.61,.36,1) both}
.step-in-prev{animation:inPrev .45s cubic-bezier(.22,.61,.36,1) both}
@keyframes inNext{from{opacity:0;transform:translateY(34px)}to{opacity:1;transform:none}}
@keyframes inPrev{from{opacity:0;transform:translateY(-34px)}to{opacity:1;transform:none}}
.inner{width:100%;max-width:640px;margin:auto}
.qnum{display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:var(--bl);margin-bottom:6px}
.qnum svg{width:15px;height:15px}
.q{font-size:clamp(23px,3.4vw,32px);font-weight:800;line-height:1.18;letter-spacing:-.01em}
.qdesc{font-size:14px;color:var(--tx3);margin-top:10px;line-height:1.5}
.fields{margin-top:26px;display:flex;flex-direction:column;gap:20px}

/* labelled field */
.tf-field .lbl{display:block;font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:8px}
.req{color:var(--gs);font-weight:700;margin-left:2px}
.hint{font-size:11px;color:var(--tx3);margin-top:6px}
.fi{width:100%;height:52px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.16);border-radius:12px;color:#fff;font-family:inherit;font-size:17px;padding:0 15px;transition:border-color .15s,background .15s}
.fi::placeholder{color:rgba(255,255,255,.32)}
.fi:focus{outline:none;border-color:var(--bl);background:rgba(59,130,246,.06)}
select.fi{cursor:pointer}
select.fi option{background:#16294a;color:#fff}
textarea.fi{height:auto;min-height:96px;padding:12px 15px;resize:vertical;line-height:1.5}
.fi-ro{background:rgba(255,255,255,.03);color:rgba(255,255,255,.55);cursor:pointer;height:46px;font-size:15px}
.fi-ro:hover{border-color:var(--bl-brd);color:#fff}
.fi-unlocked{background:rgba(59,130,246,.08)!important;border-color:var(--bl)!important;color:#fff!important;cursor:text}
.fi-wrap{position:relative}
.fi-has-unit{padding-right:52px}
.fi-unit{position:absolute;right:15px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--tx3);pointer-events:none}
.fi.shake{animation:shake .4s;border-color:var(--red)!important}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
/* two-up compact grid for review/read-only rows */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}

/* choice options (Typeform style) */
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:rgba(255,255,255,.045);border:1.5px solid rgba(255,255,255,.18);border-radius:12px;padding:14px 15px;cursor:pointer;color:var(--tx);font-size:16px;font-weight:500;transition:all .13s}
.opt:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.07)}
.opt:focus-visible{outline:none;border-color:var(--bl);box-shadow:0 0 0 3px rgba(59,130,246,.25)}
.opt.sel{border-color:var(--gs);background:var(--gs-dim);color:#fff}
.opt.sel:focus-visible{box-shadow:0 0 0 3px rgba(78,187,129,.3)}
.opt .key{flex-shrink:0;width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.24);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--tx2)}
.opt.sel .key{background:var(--gs);border-color:var(--gs);color:#fff}
.opt .olbl{flex:1}
.opt .tick{opacity:0;color:var(--gs);font-weight:800;transition:opacity .12s}
.opt.sel .tick{opacity:1}

.err{color:var(--red);font-size:12.5px;margin-top:14px;min-height:16px;font-weight:600;opacity:0;transition:opacity .15s}
.err.show{opacity:1}

/* ── Footer: back / continue + key hints ── */
.foot{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 24px;background:linear-gradient(0deg,rgba(12,24,46,.96),rgba(12,24,46,.72) 70%,transparent);backdrop-filter:blur(6px)}
.foot-left{display:flex;align-items:center;gap:10px}
.btn-back{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.06);border:1px solid var(--brd);color:var(--tx2);font-size:13px;padding:11px 15px;border-radius:10px;cursor:pointer}
.btn-back:hover{color:#fff;border-color:rgba(255,255,255,.34)}
.btn-back:disabled{opacity:.35;cursor:not-allowed}
.foot-right{display:flex;align-items:center;gap:14px}
.ok{display:flex;align-items:center;gap:9px;background:var(--gs);border:none;color:#fff;font-size:15px;font-weight:700;padding:12px 24px;border-radius:11px;cursor:pointer;transition:filter .15s}
.ok:hover{filter:brightness(1.08)}
.ok svg{width:15px;height:15px}
.enter-hint{font-size:12px;color:var(--tx3)}
.enter-hint b{color:var(--tx2)}
.keyhints{display:flex;gap:14px;font-size:11px;color:var(--tx3);flex-wrap:wrap}
.keyhints kbd{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-family:inherit;font-size:10.5px;color:var(--tx2)}
@media(max-width:720px){.keyhints{display:none}}

/* saved chip + toast */
.saved{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx3)}
.saved svg{width:12px;height:12px;color:var(--gs)}
.toast{position:fixed;top:78px;left:50%;transform:translateX(-50%) translateY(-12px);background:#16294a;border:1px solid var(--brd);border-radius:11px;padding:12px 18px;font-size:13px;box-shadow:0 12px 36px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:all .3s;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.good{border-color:var(--gs-brd)}

/* end screen */
.end{text-align:center}
.end .big{font-size:clamp(26px,4vw,40px);font-weight:800;letter-spacing:-.02em}
.end .sub{color:var(--tx3);margin-top:12px;font-size:15px}
.end-check{width:76px;height:76px;border-radius:50%;background:var(--gs-dim);border:2px solid var(--gs);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.end-check svg{width:38px;height:38px;color:var(--gs)}
.summary{margin:26px auto 0;max-width:520px;text-align:left;background:var(--card);border:1px solid var(--brd);border-radius:14px;overflow:hidden}
.summary-row{display:flex;justify-content:space-between;gap:14px;padding:10px 16px;font-size:13px;border-top:1px solid rgba(255,255,255,.07)}
.summary-row:first-child{border-top:none}
.summary-row .k{color:var(--tx3)}
.summary-row .v{color:#fff;font-weight:600;text-align:right}
.summary-row .edit{color:var(--bl);cursor:pointer;font-weight:600;font-size:12px}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div class="brand"><b>Primark Stores Ltd</b><span>Packaging compliance portal</span></div>
    <div class="top-right">
      <span class="sku" id="sku">PRK-003-DRS-RED · Garment polybag</span>
      <span class="due">Due: <strong>26 Jul 2026</strong></span>
    </div>
  </div>
  <div class="rail" id="rail"></div>
  <div class="pbar"><div class="pbar-fill" id="pbar"></div></div>
</header>

<main class="stage" id="stage"></main>

<footer class="foot">
  <div class="foot-left">
    <button class="btn-back" id="btnBack" onclick="goPrev()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m15 18-6-6 6-6"/></svg>Back</button>
    <span class="saved"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="m4.5 12.5 5 5 10-11"/></svg><span id="savedTxt">Draft saved</span></span>
  </div>
  <div class="foot-right">
    <div class="keyhints">
      <span><kbd>Enter ↵</kbd> continue</span>
      <span><kbd>A</kbd>–<kbd>D</kbd> choose</span>
      <span><kbd>↑</kbd><kbd>↓</kbd> move</span>
      <span><kbd>⌥ ←</kbd> back</span>
    </div>
    <button class="ok" id="btnOk" onclick="goNext()"><span id="okLbl">OK</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M20 6 9 17l-5-5"/></svg></button>
    <span class="enter-hint">press <b>Enter ↵</b></span>
  </div>
</footer>

<div class="toast" id="toast" role="status"></div>

<script>
/* ── Step model (11 steps of the v7 packaging wizard) ── */
const STEPS=[
 {t:'Product details', d:'Auto-populated from the style record — click any field to override.',
  fields:[
   {type:'ro-grid', items:[
     ['Department','04 Uwear & Nwear'],['Class','04 029 PJ Separates'],
     ['Sub Class','04 029 002 Woven Pyjamas'],['Style Description','Red Midi Dress'],
     ['Style ORIN','991171505']]},
   {type:'text', label:'Additional Style ORINs (same packaging)', ph:'e.g. 991130431; 991130432', hint:'Other ORINs with identical packaging — separate with “;”'}
  ]},
 {t:'How is it packed & palletised?', d:'How the product is packed and shipped in bulk.',
  fields:[
   {type:'chips', label:'Packing method', name:'packing', req:true, value:'Flat',
    options:['Flat','Boxed','GOH (garment on hanger)','Hanging']},
   {type:'number', label:'Singles / each per case or box', req:true, value:'35'},
   {type:'number', label:'Cases / boxes per pallet', req:true, value:'30'}
  ]},
 {t:'Packaging level & format', d:'Identify the hierarchy and type of this component.',
  fields:[
   {type:'chips', label:'Packaging level', name:'level', req:true, value:'Primary — touches the product',
    options:['Primary — touches the product','Secondary — groups units','Tertiary — transport']},
   {type:'select', label:'Packaging type', req:true, value:'Flexible film bag',
    options:['Flexible film bag','Rigid box / carton','Hanger','Label / tag','Wrap / band','Other']},
   {type:'text', label:'Other type description', ph:'Only if “Other” selected'}
  ]},
 {t:'Who supplies this packaging?', d:'Who manufactures or supplies this packaging component.',
  fields:[
   {type:'chips', label:'Packaging source type', name:'source', req:true,
    options:['Supplier-manufactured','Third-party converter','Primark-nominated source']}
  ]},
 {t:'Material information', d:'Composition by material and percentage weight (must total 100%).',
  fields:[
   {type:'select', label:'Base material', req:true, value:'Plastic',
    options:['Plastic','Paper / board','Metal','Glass','Composite']},
   {type:'chips', label:'Number of materials', name:'nummat', req:true, value:'2', options:['1','2','3','4']},
   {type:'text', label:'Material 1 name', ph:'e.g. LDPE film', req:true},
   {type:'number', label:'% Material 1', unit:'%', req:true},
   {type:'text', label:'Material 2 name', ph:'e.g. Paper label'},
   {type:'number', label:'% Material 2', unit:'%'}
  ]},
 {t:'Recycled content', d:'PPWR Article 7 recycled-content declarations.',
  fields:[
   {type:'chips', label:'Does this component contain recycled content?', name:'recycled', req:true, options:['Yes','No']},
   {type:'number', label:'Post-consumer recycled content', unit:'%', id:'pcr', hint:'Required when recycled content = Yes'},
   {type:'number', label:'Post-industrial recycled content', unit:'%'},
   {type:'textarea', label:'Additional comments', ph:'Anything the compliance team should know'}
  ]},
 {t:'Colour & decoration', d:'Visual properties of this packaging component.',
  fields:[
   {type:'chips', label:'Opacity / transparency', name:'opacity', req:true, options:['Transparent','Translucent','Opaque']},
   {type:'chips', label:'Decoration / printing', name:'deco', req:true, options:['None','1-colour print','2-colour print','Full print']}
  ]},
 {t:'Weight & grammage', d:'Physical weight properties of this component.',
  fields:[
   {type:'number', label:'Weight per unit', unit:'g', req:true, ph:'e.g. 6.2'},
   {type:'number', label:'Grammage', unit:'gsm', req:true, ph:'e.g. 46'},
   {type:'number', label:'Gauge', unit:'µm', ph:'e.g. 50 — film only'}
  ]},
 {t:'Material dimensions', d:'Flat / unassembled dimensions of this component.',
  fields:[
   {type:'number', label:'Length (or diameter)', unit:'mm', req:true, ph:'e.g. 400'},
   {type:'number', label:'Width', unit:'mm', req:true, ph:'e.g. 320'},
   {type:'number', label:'Height / depth', unit:'mm', ph:'Leave blank for flat components'}
  ]},
 {t:'Additional information', d:'Certifications and packaging supplier details.',
  fields:[
   {type:'select', label:'Certification', req:true, options:['GRS','RCS','FSC','None','Other']},
   {type:'text', label:'Other certification details', ph:'Only if “Other” selected'},
   {type:'text', label:'Packaging supplier name', req:true, ph:'Company name'},
   {type:'text', label:'Packaging supplier address', req:true, ph:'Street, city, country'}
  ]},
 {t:'Material compliance', d:'Chemical and substance compliance declarations.',
  fields:[
   {type:'select', label:'Compliance standard', req:true, options:['EU PPWR / REACH','UK Packaging Regs','Both EU & UK']},
   {type:'chips', label:'Mineral oils above limits?', name:'minoil', req:true, options:['Yes','No']},
   {type:'chips', label:'BPA above limits?', name:'bpa', req:true, options:['Yes','No']},
   {type:'chips', label:'Contains PFAs?', name:'pfas', req:true, options:['Yes','No']},
   {type:'chips', label:'Chlorine used in manufacture?', name:'chlorine', req:true, options:['Yes','No']}
  ]}
];
const RAIL_LABELS=['Product','Packaging','Level','Source','Materials','Recycled','Colour','Weight','Dimensions','Add. Info','Compliance'];
const N=STEPS.length;
let cur=0, ended=false;

/* ── helpers ── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function fieldHTML(f,si,fi){
  const req=f.req?'<span class="req">*</span>':'';
  const hint=f.hint?`<div class="hint">${esc(f.hint)}</div>`:'';
  if(f.type==='ro-grid'){
    const rows=f.items.map(([k,v])=>`<div class="tf-field"><span class="lbl">${esc(k)}</span><input class="fi fi-ro" value="${esc(v)}" readonly></div>`).join('');
    return `<div class="grid2">${rows}</div>`;
  }
  if(f.type==='chips'){
    const opts=f.options.map((o,oi)=>{
      const L=String.fromCharCode(65+oi), sel=(f.value===o)?' sel':'';
      return `<button type="button" class="opt${sel}" data-k="${L}" data-val="${esc(o)}" role="radio" aria-checked="${f.value===o}" tabindex="${oi===0?0:-1}" onclick="selectOpt(this)"><span class="key">${L}</span><span class="olbl">${esc(o)}</span><span class="tick">✓</span></button>`;
    }).join('');
    return `<div class="tf-field" data-req="${f.req?1:0}" data-kind="chips" data-name="${f.name||''}"><span class="lbl">${esc(f.label)}${req}</span><div class="opts" role="radiogroup">${opts}</div>${hint}</div>`;
  }
  if(f.type==='select'){
    const ph=f.value?'':'<option value="" disabled selected>Select…</option>';
    const opts=f.options.map(o=>`<option${o===f.value?' selected':''}>${esc(o)}</option>`).join('');
    return `<div class="tf-field" data-req="${f.req?1:0}"><span class="lbl">${esc(f.label)}${req}</span><select class="fi">${ph}${opts}</select>${hint}</div>`;
  }
  if(f.type==='textarea'){
    return `<div class="tf-field" data-req="${f.req?1:0}"><span class="lbl">${esc(f.label)}${req}</span><textarea class="fi" placeholder="${esc(f.ph||'')}"></textarea>${hint}</div>`;
  }
  const unit=f.unit?`<span class="fi-unit">${esc(f.unit)}</span>`:'';
  const cls='fi'+(f.unit?' fi-has-unit':'');
  const id=f.id?` id="${f.id}"`:'';
  const val=f.value!=null?` value="${esc(f.value)}"`:'';
  const type=f.type==='number'?'number':'text';
  return `<div class="tf-field" data-req="${f.req?1:0}"><span class="lbl">${esc(f.label)}${req}</span><div class="fi-wrap"><input${id} type="${type}" class="${cls}" placeholder="${esc(f.ph||'')}"${val}>${unit}</div>${hint}</div>`;
}

/* build all step panels + the end screen */
function build(){
  const stage=document.getElementById('stage');
  stage.innerHTML=STEPS.map((s,si)=>{
    const fields=s.fields.map((f,fi)=>fieldHTML(f,si,fi)).join('');
    return `<section class="step" id="st-${si}">
      <div class="inner">
        <div class="qnum">${si+1}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="m9 6 6 6-6 6"/></svg></div>
        <h1 class="q">${esc(s.t)}</h1>
        <p class="qdesc">${esc(s.d)}</p>
        <div class="fields">${fields}</div>
        <div class="err" id="err-${si}"></div>
      </div>
    </section>`;
  }).join('')+`
    <section class="step end" id="st-end">
      <div class="inner">
        <div class="end-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg></div>
        <div class="big">All 11 steps complete</div>
        <div class="sub">Review your answers, then submit <b>PRK-003-DRS-RED</b> for compliance review.</div>
        <div class="summary" id="summary"></div>
      </div>
    </section>`;

  // step rail
  const rail=document.getElementById('rail');
  let html='';
  RAIL_LABELS.forEach((l,i)=>{
    if(i>0) html+=`<div class="rline" data-line="${i}"></div>`;
    html+=`<button class="rnode" data-i="${i}" onclick="jump(${i})"><span class="rdot" data-dot="${i}">${i+1}</span><span class="rlbl">${esc(l)}</span></button>`;
  });
  rail.innerHTML=html;

  // read-only click-to-edit
  document.querySelectorAll('.fi-ro').forEach(inp=>{
    inp.title='Click to edit';
    inp.addEventListener('mousedown',unlockRo);
    inp.addEventListener('focus',unlockRo);
  });
}
function unlockRo(e){const i=e.currentTarget;if(!i.readOnly)return;i.readOnly=false;i.classList.remove('fi-ro');i.classList.add('fi-unlocked');i.removeAttribute('title');i.focus();try{const l=i.value.length;i.setSelectionRange(l,l)}catch(_){}}

/* ── validation ── */
function stepValid(si){
  const p=document.getElementById('st-'+si); if(!p) return true;
  let bad=null;
  p.querySelectorAll('.tf-field').forEach(fld=>{
    if(bad) return;
    const req=fld.dataset.req==='1';
    if(fld.dataset.kind==='chips'){ if(req && !fld.querySelector('.opt.sel')) bad=fld.querySelector('.opt'); return; }
    const ctrl=fld.querySelector('input.fi,select.fi,textarea.fi');
    if(!ctrl) return;
    if(req && !String(ctrl.value).trim()) bad=ctrl;
  });
  // step 6 (index 5): PCR required when recycled = Yes
  if(!bad && si===5){
    const rec=document.querySelector('#st-5 [data-name="recycled"] .opt.sel');
    if(rec && rec.dataset.val==='Yes'){ const pcr=document.getElementById('pcr'); if(pcr && !pcr.value.trim()) bad=pcr; }
  }
  return bad ? {ok:false,bad} : {ok:true};
}

/* ── rail / progress paint ── */
function paintRail(){
  for(let i=0;i<N;i++){
    const dot=document.querySelector(`[data-dot="${i}"]`);
    const node=document.querySelector(`.rnode[data-i="${i}"]`);
    const done=stepValid(i).ok && i!==cur;
    dot.className='rdot'+(i===cur?' curr':(done?' done':''));
    dot.innerHTML=(done)?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2"><path d="M20 6 9 17l-5-5"/></svg>':(i+1);
    node.classList.toggle('is-curr',i===cur);
    node.classList.toggle('is-done',done);
    const line=document.querySelector(`[data-line="${i}"]`);
    if(line) line.classList.toggle('done', stepValid(i-1).ok);
  }
  let doneCount=0; for(let i=0;i<N;i++) if(stepValid(i).ok) doneCount++;
  document.getElementById('pbar').style.width=(ended?100:((cur)/N*100+ (stepValid(cur).ok?1/N*100:0)))+'%';
  document.getElementById('pbar').style.width=(ended?100:(doneCount/N*100))+'%';
}

/* ── navigation ── */
function show(i,dir){
  ended=false;
  document.querySelectorAll('.step').forEach(s=>{s.classList.remove('on','step-in-next','step-in-prev')});
  const p=document.getElementById('st-'+i);
  p.classList.add('on', dir==='prev'?'step-in-prev':'step-in-next');
  cur=i;
  document.getElementById('btnBack').disabled=(i===0);
  document.getElementById('okLbl').textContent=(i===N-1)?'Review':'OK';
  // scroll active step's dot into view
  const node=document.querySelector(`.rnode[data-i="${i}"]`); if(node) node.scrollIntoView({inline:'center',block:'nearest'});
  paintRail();
  setTimeout(()=>focusFirst(p),120);
}
function focusFirst(panel){
  const el=panel.querySelector('.opt, input.fi:not([readonly]), select.fi, textarea.fi');
  if(el){ try{el.focus({preventScroll:true})}catch(_){el.focus()} }
}
function goNext(){
  if(ended) return;
  const v=stepValid(cur);
  if(!v.ok){ shake(v.bad); showErr('Please complete this before continuing.'); return; }
  clearErr();
  if(cur<N-1) show(cur+1,'next'); else showEnd();
}
function goPrev(){ if(ended){ show(N-1,'prev'); return; } if(cur>0) show(cur-1,'prev'); }
function jump(i){ if(i===cur) return; show(i, i>cur?'next':'prev'); }

function shake(el){ if(!el) return; el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake'); try{el.focus({preventScroll:true})}catch(_){}; setTimeout(()=>el.classList.remove('shake'),450); }
function showErr(m){ const e=document.getElementById('err-'+cur); if(e){e.textContent=m;e.classList.add('show');} }
function clearErr(){ const e=document.getElementById('err-'+cur); if(e){e.classList.remove('show');} }

/* ── choice selection ── */
function selectOpt(btn){
  const grp=btn.closest('.opts');
  grp.querySelectorAll('.opt').forEach(o=>{o.classList.remove('sel');o.setAttribute('aria-checked','false');o.tabIndex=-1;});
  btn.classList.add('sel'); btn.setAttribute('aria-checked','true'); btn.tabIndex=0;
  clearErr(); paintRail(); autosave();
  const step=STEPS[cur];
  // auto-advance when the whole step is a single choice
  if(step && step.fields.length===1 && step.fields[0].type==='chips') setTimeout(()=>{ if(cur<N-1) goNext(); },330);
}

/* ── keyboard ── */
document.addEventListener('keydown',e=>{
  if(ended){ if(e.key==='Enter'){e.preventDefault();submitAll();} return; }
  const t=document.activeElement;
  const inTextarea=t&&t.tagName==='TEXTAREA';
  // Enter → continue (Shift+Enter in textarea = newline)
  if(e.key==='Enter'){ if(inTextarea&&e.shiftKey) return; e.preventDefault(); goNext(); return; }
  // ⌥/Alt + arrows jump steps
  if(e.altKey&&e.key==='ArrowLeft'){ e.preventDefault(); goPrev(); return; }
  if(e.altKey&&e.key==='ArrowRight'){ e.preventDefault(); goNext(); return; }
  // choice-group navigation when focus is on an option
  const grp = (t&&t.classList&&t.classList.contains('opt')) ? t.closest('.opts') : null;
  if(grp){
    const opts=[...grp.querySelectorAll('.opt')]; let idx=opts.indexOf(t);
    if(e.key==='ArrowDown'||e.key==='ArrowRight'){ e.preventDefault(); idx=Math.min(opts.length-1,idx+1); opts[idx].focus(); selectOpt(opts[idx]); }
    else if(e.key==='ArrowUp'||e.key==='ArrowLeft'){ e.preventDefault(); idx=Math.max(0,idx-1); opts[idx].focus(); selectOpt(opts[idx]); }
    else if(e.key===' '){ e.preventDefault(); selectOpt(t); }
    else if(/^[a-zA-Z]$/.test(e.key)){ const o=opts.find(x=>x.dataset.k===e.key.toUpperCase()); if(o){e.preventDefault();o.focus();selectOpt(o);} }
  }
});

/* ── autosave chip ── */
let saveT;
document.addEventListener('input',()=>{ clearErr(); paintRail(); autosave(); },true);
document.addEventListener('change',()=>{ paintRail(); autosave(); },true);
function autosave(){ const s=document.getElementById('savedTxt'); s.textContent='Saving…'; clearTimeout(saveT); saveT=setTimeout(()=>s.textContent='Draft saved',650); }

/* ── end screen ── */
function fieldValue(fld){
  if(fld.dataset.kind==='chips'){ const s=fld.querySelector('.opt.sel'); return s?s.dataset.val:''; }
  const c=fld.querySelector('input.fi,select.fi,textarea.fi'); if(!c) return '';
  const unit=fld.querySelector('.fi-unit'); const v=String(c.value).trim();
  return v?(v+(unit?' '+unit.textContent.trim():'')):'';
}
function showEnd(){
  ended=true;
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('on','step-in-next','step-in-prev'));
  const p=document.getElementById('st-end'); p.classList.add('on','step-in-next');
  document.getElementById('btnBack').disabled=false;
  document.getElementById('okLbl').textContent='Submit';
  // rebuild ok button action target via flag (goNext is disabled while ended; footer OK calls goNext→ we intercept)
  // summary
  const rows=[];
  STEPS.forEach((s,si)=>{
    const p2=document.getElementById('st-'+si);
    const vals=[...p2.querySelectorAll('.tf-field')].map(fieldValue).filter(Boolean);
    rows.push(`<div class="summary-row"><span class="k">${esc(s.t)}</span><span class="v">${vals.length?esc(vals.slice(0,3).join(' · '))+(vals.length>3?' · …':''):'—'}</span><span class="edit" onclick="jump(${si})">Edit</span></div>`);
  });
  document.getElementById('summary').innerHTML=rows.join('');
  paintRail();
  document.getElementById('pbar').style.width='100%';
}
function submitAll(){
  document.getElementById('sku').textContent='PRK-003-DRS-RED · Submitted';
  toast('PRK-003-DRS-RED submitted for compliance review ✓','good');
}
/* footer OK on end screen submits */
document.getElementById('btnOk').addEventListener('click',()=>{ if(ended) submitAll(); },true);

/* ── toast ── */
let toastT;
function toast(m,k){const el=document.getElementById('toast');el.textContent=m;el.className='toast show '+(k||'');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),3200);}

/* ── init: start on step 3 so the ripple/step-rail is showcased ── */
build();
show(2,'next');   // step 3 (Packaging level & format) — its rail dot ripples
</script>
</body>
</html>
