<div class="screen on" id="ru_login">
  <div class="login-wrap">
    <div style="position:relative">
      <div class="login-card">
        <div class="login-logo-zone"><img class="gs-logo-img login-logo" src="" alt="Greenstreets"></div>
        <div class="login-form-zone">
          <div class="login-title">Primark Stores Ltd</div>
          <div style="font-size:11px;color:var(--tw3);text-align:center;margin-bottom:18px">Sign in to your compliance account</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">

              <svg width="14" height="14" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
              Google
            </button>
            <button class="btn-g" style="justify-content:center;gap:6px;height:38px">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#0078d4"><path d="M0 0h11.5v11.5H0zm12.5 0H24v11.5H12.5zM0 12.5h11.5V24H0zm12.5 0H24V24H12.5z"/></svg>
              Microsoft
            </button>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin:16px 0">
            <div style="flex:1;height:1px;background:var(--line-2)"></div>
            <span style="font-size:11px;color:var(--tw3)">or</span>
            <div style="flex:1;height:1px;background:var(--line-2)"></div>
          </div>
          <input class="fi" type="email" placeholder="sarah@primark.com" style="margin-bottom:10px">
          <input class="fi" type="password" placeholder="Password" style="margin-bottom:16px">
          <button class="btn-p" style="width:100%;justify-content:center" onclick="go('ru_welcome')"><img class="btn-sw" src="" alt="" data-sw><span class="btn-c"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>Sign in</span></button>
